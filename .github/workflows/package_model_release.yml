name: Package MindFlux MiniLM Model Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag"
        required: true
        default: "mindflux-minilm-v1"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inspect repo
        run: |
          echo "==== ROOT ===="
          ls -la
          echo "==== TREE ===="
          find . -maxdepth 3 -type d

      - name: Create package
        run: |
          rm -rf dist mindflux-minilm
          mkdir -p mindflux-minilm

          MODELS_DIR=$(find . -type d -name "Models" | head -n 1)
          SOURCES_DIR=$(find . -type d -name "Sources" | head -n 1)

          echo "Models dir: $MODELS_DIR"
          echo "Sources dir: $SOURCES_DIR"

          if [ -z "$MODELS_DIR" ]; then
            echo "Models directory not found"
            exit 1
          fi

          if [ -z "$SOURCES_DIR" ]; then
            echo "Sources directory not found"
            exit 1
          fi

          cp -R "$MODELS_DIR" mindflux-minilm/
          cp -R "$SOURCES_DIR" mindflux-minilm/

          if [ -f README.md ]; then
            cp README.md mindflux-minilm/
          fi

          if [ -f Package.swift ]; then
            cp Package.swift mindflux-minilm/
          fi

      - name: Create contents file
        run: |
          cat > mindflux-minilm/CONTENTS.txt <<'EOF'
          MindFlux MiniLM CoreML Package

          Included:
          - Models/
          - Sources/

          Optional:
          - README.md
          - Package.swift

          Excluded:
          - Preview Content
          - demo assets
          - conversion scripts
          EOF

      - name: Zip package
        run: |
          mkdir -p dist
          zip -r dist/mindflux-minilm-coreml.zip mindflux-minilm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: MindFlux MiniLM Package ${{ github.event.inputs.tag_name }}
          files: dist/mindflux-minilm-coreml.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
