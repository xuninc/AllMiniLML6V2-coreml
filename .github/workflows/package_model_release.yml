name: Package MindFlux MiniLM Model Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag"
        required: true
        default: "mindflux-minilm-v1"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create package folder
        run: |
          rm -rf dist mindflux-minilm
          mkdir -p mindflux-minilm

          # Required runtime pieces
          cp -R Models mindflux-minilm/
          cp -R Sources mindflux-minilm/

          # Helpful docs if present
          if [ -f README.md ]; then cp README.md mindflux-minilm/; fi
          if [ -f Package.swift ]; then cp Package.swift mindflux-minilm/; fi

          cat > mindflux-minilm/CONTENTS.txt <<'EOF'
          MindFlux MiniLM CoreML Package

          Included:
          - Models/
            CoreML model + tokenizer/vocab resources
          - Sources/
            Swift tokenizer/inference/pooling/embedding code
          - README.md if present
          - Package.swift if present

          Not included:
          - Preview Content
          - Xcode preview assets
          - conversion scripts
          - unrelated demo UI assets

          Intended use:
          Bundle this package into MindFlux for on-device semantic embeddings.
          EOF

      - name: Zip package
        run: |
          zip -r dist-mindflux-minilm.zip mindflux-minilm
          mkdir -p dist
          mv dist-mindflux-minilm.zip dist/mindflux-minilm-coreml.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: MindFlux MiniLM CoreML Package ${{ github.event.inputs.tag_name }}
          body: |
            Packaged CoreML MiniLM embedding engine for MindFlux.

            Includes:
            - Models/
            - Sources/
            - README.md if present
            - Package.swift if present

            Excludes:
            - Preview Content
            - conversion scripts
            - demo-only assets
          files: dist/mindflux-minilm-coreml.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
